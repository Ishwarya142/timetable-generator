<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduScheduler Pro — Timetable Generation System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   DESIGN SYSTEM — Industrial Academic Aesthetic
   Dark charcoal + amber accents + monospace data
   ═══════════════════════════════════════════════ */
:root {
  --ink:       #0d0f14;
  --ink2:      #161922;
  --ink3:      #1e2330;
  --ink4:      #252d3e;
  --ink5:      #2f3850;
  --wire:      #333d52;
  --wire2:     #3e4a62;
  --fog:       #6b7899;
  --mist:      #9aa3be;
  --ghost:     #c8d0e7;
  --snow:      #e8edf8;
  --white:     #f4f7ff;
  --amber:     #f5a623;
  --amber2:    #e8940f;
  --amber3:    #c97d00;
  --amberGlow: rgba(245,166,35,.12);
  --teal:      #00d4aa;
  --teal2:     #00b894;
  --tealGlow:  rgba(0,212,170,.1);
  --rose:      #ff6b6b;
  --rose2:     #e05555;
  --violet:    #a78bfa;
  --violet2:   #7c5ff0;
  --sky:       #38bdf8;
  --lime:      #a3e635;
  --r:         6px;
  --r2:        10px;
  --r3:        16px;
  --shadow:    0 8px 32px rgba(0,0,0,.45);
  --shadowSm:  0 2px 12px rgba(0,0,0,.3);
  --glow:      0 0 20px rgba(245,166,35,.2);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { height: 100%; scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--ink);
  color: var(--snow);
  min-height: 100vh;
  overflow-x: hidden;
  font-size: 14px;
  line-height: 1.6;
}

/* Scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--ink2); }
::-webkit-scrollbar-thumb { background: var(--ink5); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--wire); }

/* ─── LAYOUT ─── */
.shell { display: flex; min-height: 100vh; }

/* ─── SIDEBAR ─── */
.sidebar {
  width: 240px;
  min-width: 240px;
  background: var(--ink2);
  border-right: 1px solid var(--wire);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  z-index: 50;
}

.brand {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--wire);
}

.brand-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
}

.brand-icon {
  width: 34px;
  height: 34px;
  background: linear-gradient(135deg, var(--amber) 0%, var(--amber2) 100%);
  border-radius: var(--r2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  box-shadow: 0 4px 12px rgba(245,166,35,.3);
}

.brand-name {
  font-family: 'Outfit', sans-serif;
  font-weight: 800;
  font-size: 15px;
  color: var(--white);
  letter-spacing: -.03em;
}

.brand-sub {
  font-size: 10px;
  color: var(--fog);
  font-family: 'DM Mono', monospace;
  letter-spacing: .05em;
}

/* Nav */
.nav { padding: 12px 0; flex: 1; }
.nav-group { margin-bottom: 4px; }
.nav-group-label {
  font-size: 9px;
  font-weight: 600;
  color: var(--fog);
  text-transform: uppercase;
  letter-spacing: .1em;
  padding: 10px 20px 4px;
  font-family: 'DM Mono', monospace;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 20px;
  cursor: pointer;
  color: var(--fog);
  font-size: 13px;
  font-weight: 500;
  transition: all .15s;
  border-left: 2px solid transparent;
  position: relative;
}
.nav-item:hover { color: var(--snow); background: var(--ink3); }
.nav-item.active {
  color: var(--amber);
  background: var(--amberGlow);
  border-left-color: var(--amber);
}
.nav-icon { font-size: 15px; width: 18px; text-align: center; }
.nav-badge {
  margin-left: auto;
  background: var(--rose2);
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 20px;
  font-family: 'DM Mono', monospace;
}

/* Sidebar footer */
.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--wire);
}
.sidebar-status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--fog);
  margin-bottom: 8px;
  font-family: 'DM Mono', monospace;
}
.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--teal);
  box-shadow: 0 0 6px var(--teal);
  flex-shrink: 0;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ─── MAIN ─── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
}

/* Topbar */
.topbar {
  height: 54px;
  background: var(--ink2);
  border-bottom: 1px solid var(--wire);
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 40;
}
.topbar-title {
  font-family: 'Outfit', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--white);
}
.topbar-sub { font-size: 11px; color: var(--fog); }
.topbar-spacer { flex: 1; }

/* Notification toast */
.toast {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 999;
  padding: 11px 18px;
  border-radius: var(--r2);
  font-size: 13px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: var(--shadow);
  animation: slideIn .25s ease;
  max-width: 340px;
}
@keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
.toast-success { background: #0d2b1e; border: 1px solid var(--teal); color: var(--teal); }
.toast-error   { background: #2b0d0d; border: 1px solid var(--rose); color: var(--rose); }
.toast-info    { background: #1a1d0d; border: 1px solid var(--amber); color: var(--amber); }

/* ─── CONTENT AREA ─── */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 28px;
}

/* Page header */
.page-header { margin-bottom: 24px; }
.page-title {
  font-family: 'Outfit', sans-serif;
  font-size: 22px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -.03em;
  margin-bottom: 3px;
}
.page-sub { font-size: 13px; color: var(--fog); }

/* ─── COMPONENTS ─── */

/* Cards */
.card {
  background: var(--ink2);
  border: 1px solid var(--wire);
  border-radius: var(--r3);
  padding: 22px;
  margin-bottom: 18px;
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}
.card-title {
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--ghost);
  display: flex;
  align-items: center;
  gap: 7px;
}
.card-title::before {
  content: '';
  width: 3px; height: 14px;
  background: var(--amber);
  border-radius: 2px;
  display: block;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 18px;
  border-radius: var(--r);
  border: none;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  transition: all .15s;
  white-space: nowrap;
  text-decoration: none;
}
.btn:disabled { opacity: .4; cursor: not-allowed; pointer-events: none; }
.btn-primary {
  background: var(--amber);
  color: var(--ink);
}
.btn-primary:hover { background: var(--amber2); transform: translateY(-1px); box-shadow: var(--glow); }
.btn-ghost {
  background: var(--ink3);
  color: var(--ghost);
  border: 1px solid var(--wire);
}
.btn-ghost:hover { background: var(--ink4); color: var(--white); border-color: var(--wire2); }
.btn-teal { background: var(--teal2); color: var(--ink); }
.btn-teal:hover { background: var(--teal); transform: translateY(-1px); }
.btn-danger { background: var(--rose2); color: #fff; }
.btn-danger:hover { background: var(--rose); }
.btn-sm { padding: 5px 11px; font-size: 11px; }
.btn-icon { padding: 7px; width: 32px; height: 32px; justify-content: center; }

/* Generate button — special */
.btn-generate {
  background: linear-gradient(135deg, var(--amber) 0%, var(--amber2) 100%);
  color: var(--ink);
  font-weight: 700;
  padding: 10px 22px;
  font-size: 14px;
  box-shadow: 0 4px 16px rgba(245,166,35,.35);
  position: relative;
  overflow: hidden;
}
.btn-generate::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.15), transparent);
  pointer-events: none;
}
.btn-generate:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(245,166,35,.45); }
.btn-generate:active { transform: translateY(0); }

/* Spinner */
.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(13,15,20,.3);
  border-top-color: var(--ink);
  border-radius: 50%;
  animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Forms */
.form-grid { display: grid; gap: 14px; }
.fg-2 { grid-template-columns: 1fr 1fr; }
.fg-3 { grid-template-columns: 1fr 1fr 1fr; }
.fg-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--mist);
  text-transform: uppercase;
  letter-spacing: .06em;
  font-family: 'DM Mono', monospace;
}
.form-input, .form-select, .form-textarea {
  background: var(--ink3);
  border: 1px solid var(--wire);
  border-radius: var(--r);
  padding: 9px 12px;
  color: var(--snow);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  width: 100%;
  transition: border-color .15s, box-shadow .15s;
  appearance: none;
}
.form-input:focus, .form-select:focus { outline: none; border-color: var(--amber); box-shadow: 0 0 0 3px rgba(245,166,35,.12); }
.form-input::placeholder { color: var(--fog); }
.form-select option { background: var(--ink3); }

/* Multi-select checkboxes */
.check-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 6px; margin-top: 4px; }
.check-item {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 10px;
  background: var(--ink3);
  border: 1px solid var(--wire);
  border-radius: var(--r);
  cursor: pointer;
  font-size: 12px;
  color: var(--mist);
  transition: all .12s;
}
.check-item:hover { border-color: var(--amber); color: var(--snow); }
.check-item input { width: 13px; height: 13px; accent-color: var(--amber); }
.check-item.checked { border-color: var(--amber); background: var(--amberGlow); color: var(--amber); }

/* Multi-select list */
.multi-list {
  border: 1px solid var(--wire);
  border-radius: var(--r);
  background: var(--ink3);
  max-height: 150px;
  overflow-y: auto;
  padding: 4px;
}
.multi-option {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
  color: var(--mist);
  transition: all .1s;
}
.multi-option:hover { background: var(--ink4); color: var(--snow); }
.multi-option input { accent-color: var(--amber); }

/* Stats grid */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 22px; }
.stat-card {
  background: var(--ink2);
  border: 1px solid var(--wire);
  border-radius: var(--r3);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--border-color, var(--amber));
}
.stat-num {
  font-family: 'Outfit', sans-serif;
  font-size: 28px;
  font-weight: 800;
  color: var(--num-color, var(--amber));
  line-height: 1;
  margin-bottom: 4px;
}
.stat-label { font-size: 11px; color: var(--fog); font-family: 'DM Mono', monospace; }

/* Table */
.table-wrap {
  overflow-x: auto;
  border-radius: var(--r2);
  border: 1px solid var(--wire);
}
.data-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.data-table thead { background: var(--ink3); }
.data-table th {
  padding: 10px 14px;
  text-align: left;
  font-size: 10px;
  font-weight: 600;
  color: var(--fog);
  text-transform: uppercase;
  letter-spacing: .08em;
  white-space: nowrap;
  font-family: 'DM Mono', monospace;
}
.data-table td { padding: 11px 14px; border-top: 1px solid var(--wire); color: var(--snow); vertical-align: middle; }
.data-table tbody tr:hover td { background: var(--ink3); }

/* Badges */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 600;
  font-family: 'DM Mono', monospace;
  white-space: nowrap;
}
.badge-amber  { background: rgba(245,166,35,.15); color: var(--amber); border: 1px solid rgba(245,166,35,.25); }
.badge-teal   { background: rgba(0,212,170,.12); color: var(--teal); border: 1px solid rgba(0,212,170,.2); }
.badge-rose   { background: rgba(255,107,107,.12); color: var(--rose); border: 1px solid rgba(255,107,107,.2); }
.badge-violet { background: rgba(167,139,250,.12); color: var(--violet); border: 1px solid rgba(167,139,250,.2); }
.badge-ghost  { background: var(--ink4); color: var(--mist); border: 1px solid var(--wire); }
.badge-lime   { background: rgba(163,230,53,.12); color: var(--lime); border: 1px solid rgba(163,230,53,.2); }

/* Color dot */
.dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

/* Progress bar */
.prog-track { height: 5px; background: var(--ink4); border-radius: 3px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 3px; transition: width .6s ease; }

/* Tags */
.tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 7px;
  background: var(--ink4);
  border: 1px solid var(--wire2);
  border-radius: 20px;
  font-size: 10px;
  color: var(--mist);
}
.tag-remove { cursor: pointer; color: var(--fog); margin-left: 2px; font-size: 9px; }
.tag-remove:hover { color: var(--rose); }
.tag-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }

/* Tabs */
.tabs {
  display: flex;
  background: var(--ink3);
  border-radius: var(--r2);
  padding: 4px;
  gap: 3px;
  margin-bottom: 20px;
  border: 1px solid var(--wire);
}
.tab-btn {
  flex: 1;
  padding: 8px 16px;
  border-radius: var(--r);
  cursor: pointer;
  font-size: 12.5px;
  font-weight: 600;
  color: var(--fog);
  transition: all .15s;
  text-align: center;
  border: none;
  background: transparent;
  font-family: 'DM Sans', sans-serif;
}
.tab-btn:hover { color: var(--snow); background: var(--ink4); }
.tab-btn.active {
  background: var(--ink2);
  color: var(--amber);
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
  border: 1px solid var(--wire);
}

/* Alert */
.alert {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px 16px;
  border-radius: var(--r2);
  font-size: 13px;
  margin-bottom: 14px;
}
.alert-success { background: rgba(0,212,170,.08); border: 1px solid rgba(0,212,170,.2); color: var(--teal); }
.alert-error   { background: rgba(255,107,107,.08); border: 1px solid rgba(255,107,107,.2); color: var(--rose); }
.alert-info    { background: var(--amberGlow); border: 1px solid rgba(245,166,35,.2); color: var(--amber); }
.alert-icon    { font-size: 15px; flex-shrink: 0; margin-top: 1px; }

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 56px 24px;
  color: var(--fog);
  text-align: center;
  gap: 10px;
}
.empty-icon { font-size: 36px; margin-bottom: 4px; opacity: .6; }
.empty-title { font-size: 15px; font-weight: 600; color: var(--mist); }
.empty-sub { font-size: 12px; color: var(--fog); }

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
  animation: fadeIn .2s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal {
  background: var(--ink2);
  border: 1px solid var(--wire2);
  border-radius: var(--r3);
  padding: 28px;
  width: 520px;
  max-width: 92vw;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: var(--shadow);
  animation: scaleIn .2s ease;
}
@keyframes scaleIn { from{transform:scale(.95);opacity:0} to{transform:scale(1);opacity:1} }
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 22px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--wire);
}
.modal-title {
  font-family: 'Outfit', sans-serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--white);
}
.modal-close {
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--r);
  border: none;
  background: var(--ink4);
  color: var(--fog);
  cursor: pointer;
  font-size: 16px;
}
.modal-close:hover { background: var(--rose2); color: #fff; }

/* ─── TIMETABLE GRID ─── */
.tt-wrap { overflow-x: auto; }

.tt-grid {
  border-collapse: collapse;
  width: 100%;
  font-size: 11.5px;
  min-width: 600px;
}

.tt-grid th {
  background: var(--ink3);
  padding: 10px 8px;
  text-align: center;
  font-size: 10px;
  font-weight: 600;
  color: var(--fog);
  text-transform: uppercase;
  letter-spacing: .08em;
  border: 1px solid var(--wire);
  white-space: nowrap;
  font-family: 'DM Mono', monospace;
}

.tt-grid .row-label {
  background: var(--ink3);
  padding: 8px 12px;
  border: 1px solid var(--wire);
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  color: var(--amber);
  white-space: nowrap;
  min-width: 70px;
}

.tt-grid td {
  border: 1px solid var(--wire);
  padding: 3px;
  min-width: 100px;
  height: 58px;
  vertical-align: middle;
}

/* Cell types */
.tt-cell {
  border-radius: 5px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  min-height: 50px;
  padding: 5px 6px;
  cursor: pointer;
  transition: filter .15s, transform .1s;
  text-align: center;
  position: relative;
}
.tt-cell:hover { filter: brightness(1.15); transform: scale(1.02); z-index: 2; }

.tt-cell-filled {
  background: var(--cell-bg);
  border: 1px solid var(--cell-border);
}
.tt-cell-break {
  background: repeating-linear-gradient(
    45deg,
    var(--ink3) 0px,
    var(--ink3) 6px,
    var(--ink4) 6px,
    var(--ink4) 12px
  );
  cursor: default;
  border: 1px solid var(--wire);
}
.tt-cell-empty {
  border: 1px dashed var(--wire);
  background: transparent;
  cursor: pointer;
}
.tt-cell-empty:hover { border-color: var(--amber); background: var(--amberGlow); }

.cell-subj {
  font-size: 11px;
  font-weight: 700;
  color: var(--cell-text);
  font-family: 'Outfit', sans-serif;
  line-height: 1.1;
}
.cell-name {
  font-size: 9px;
  color: var(--cell-text);
  opacity: .75;
  margin-top: 2px;
  line-height: 1.2;
  max-width: 90px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.cell-teacher {
  font-size: 8.5px;
  color: var(--cell-text);
  opacity: .6;
  font-family: 'DM Mono', monospace;
  margin-top: 2px;
}
.cell-break-label { font-size: 9px; color: var(--fog); font-family: 'DM Mono', monospace; }
.cell-empty-label { font-size: 9px; color: var(--fog); }

/* Legend */

}

.swatch.selected { border-color: white; }

/* Drag & Drop */
.dragging-row { opacity: .5; }
.drop-target { outline: 2px dashed var(--amber); outline-offset: -2px; }

/* Responsive */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .fg-3, .fg-4 { grid-template-columns: 1fr 1fr; }
  .fg-2 { grid-template-columns: 1fr; }
}

/* ─── GENERATE PROGRESS ─── */
.gen-progress {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px;
  gap: 16px;
}
.gen-spinner {
  width: 48px; height: 48px;
  border: 3px solid var(--wire);
  border-top-color: var(--amber);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
.gen-label {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--fog);
  text-align: center;
}
.gen-steps { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 300px; }
.gen-step {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  color: var(--fog);
  transition: color .3s;
}
.gen-step.done { color: var(--teal); }
.gen-step.active { color: var(--amber); }
.gen-step-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  border: 2px solid currentColor;
  flex-shrink: 0;
}
.gen-step.done .gen-step-dot { background: var(--teal); border-color: var(--teal); }
.gen-step.active .gen-step-dot { background: var(--amber); border-color: var(--amber); animation: pulse 1s ease-in-out infinite; }

/* Input group row */
.input-row { display: flex; gap: 8px; align-items: flex-end; }
.input-row .form-input, .input-row .form-select { flex: 1; }

/* Section divider */
.divider { border: none; border-top: 1px solid var(--wire); margin: 20px 0; }

<div class="shell" id="app">Loading...</div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════════
   INTEGRATED STATE — All data lives here (replaces PostgreSQL)
   In production: swap these arrays for API fetch() calls
   ═══════════════════════════════════════════════════════════ */
const DB = {
  departments: [
    { id: 1, name: 'Computer Science', type: 'college', color: '#4f8ef7' },
    { id: 2, name: 'Electronics & Comm', type: 'college', color: '#a78bfa' },

  ],

    { id: 2, name: 'Algorithms',           code: 'AL',  dept_id: 1, ppw: 4, color: '#0891b2' },
    { id: 3, name: 'Database Systems',     code: 'DB',  dept_id: 1, ppw: 3, color: '#7c3aed' },
    { id: 4, name: 'Operating Systems',    code: 'OS',  dept_id: 1, ppw: 3, color: '#be185d' },
    { id: 5, name: 'Signals & Systems',    code: 'SS',  dept_id: 2, ppw: 5, color: '#c2410c' },
    { id: 6, name: 'Digital Circuits',     code: 'DC',  dept_id: 2, ppw: 4, color: '#0f766e' },
    { id: 7, name: 'Mathematics',          code: 'MA',  dept_id: 3, ppw: 5, color: '#d97706' },
    { id: 8, name: 'Physics',              code: 'PH',  dept_id: 3, ppw: 4, color: '#059669' },
  ],
  teachers: [
    { id: 1, name: 'Dr. Ananya Sharma',  dept_id: 1, subject_ids: [1, 2], class_ids: [1, 2], max_day: 4, max_week: 18, unavailable: [] },
    { id: 2, name: 'Prof. Rajiv Gupta',  dept_id: 1, subject_ids: [3, 4], class_ids: [1, 2], max_day: 4, max_week: 16, unavailable: [] },
    { id: 3, name: 'Dr. Meena Patel',   dept_id: 2, subject_ids: [5, 6], class_ids: [3],    max_day: 5, max_week: 20, unavailable: [] },
    { id: 4, name: 'Ms. Priya Reddy',   dept_id: 3, subject_ids: [7, 8], class_ids: [4],    max_day: 5, max_week: 20, unavailable: [] },
  ],
  class_subject_map: [
    { class_id: 1, subject_ids: [1, 2, 3, 4] },
    { class_id: 2, subject_ids: [1, 2, 3, 4] },
    { class_id: 3, subject_ids: [5, 6] },
    { class_id: 4, subject_ids: [7, 8] },
  ],
  config: {
    working_days: 5,
    periods_per_day: 8,
    break_periods: [2, 5],   // 0-indexed; periods 3 and 6 are breaks
    day_names: ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'],
  },
  nextId: 100,
};

/* ═══════════════════════════════════════
   CSP SOLVER ENGINE
   ═══════════════════════════════════════ */
class TimetableSolver {
  constructor(db) {
    this.db     = db;
    this.days   = db.config.working_days;
    this.periods = db.config.periods_per_day;
    this.breaks  = new Set(db.config.break_periods);

    // Grid: grid[classId][day][period] = {subjectId, teacherId} | 'BREAK' | null
    this.grid = {};
    // teacher_slot[teacherId_day_period] = classId
    this.teacherSlot = {};
    // teacher_day_count[teacherId_day] = int
    this.teacherDayCount = {};
    // teacher_week_count[teacherId] = int
    this.teacherWeekCount = {};
  }

  _initGrid(classIds) {
    for (const cid of classIds) {
      this.grid[cid] = [];
      for (let d = 0; d < this.days; d++) {
        const row = [];
        for (let p = 0; p < this.periods; p++) {
          row.push(this.breaks.has(p) ? 'BREAK' : null);
        }
        this.grid[cid].push(row);
      }
    }
    for (const t of this.db.teachers) {
      this.teacherWeekCount[t.id] = 0;
      for (let d = 0; d < this.days; d++) {
        this.teacherDayCount[`${t.id}_${d}`] = 0;
      }
    }
  }

  _findTeacher(classId, subjectId) {
    const candidates = this.db.teachers.filter(t =>
      t.subject_ids.includes(subjectId) && t.class_ids.includes(classId)
    );
    if (!candidates.length) return null;
    // Prefer least loaded teacher
    return candidates.sort((a, b) =>
      (this.teacherWeekCount[a.id] || 0) - (this.teacherWeekCount[b.id] || 0)
    )[0];
  }

  _canAssign(classId, day, period, teacherId, subjectId) {
    if (this.breaks.has(period)) return false;
    if (this.grid[classId][day][period] !== null) return false;

    const tk = `${teacherId}_${day}_${period}`;
    if (this.teacherSlot[tk] !== undefined) return false;

    const teacher = this.db.teachers.find(t => t.id === teacherId);
    if (!teacher) return false;

    const dk = `${teacherId}_${day}`;
    if ((this.teacherDayCount[dk] || 0) >= teacher.max_day) return false;
    if ((this.teacherWeekCount[teacherId] || 0) >= teacher.max_week) return false;

    // Unavailable slots
    if (teacher.unavailable && teacher.unavailable.some(u => u.day === day && u.period === period)) return false;

    return true;
  }

  _hasConsecutive(classId, day, period, subjectId) {
    if (period > 0) {
      const prev = this.grid[classId][day][period - 1];
      if (prev && prev !== 'BREAK' && prev.subjectId === subjectId) return true;
    }
    if (period < this.periods - 1) {
      const next = this.grid[classId][day][period + 1];
      if (next && next !== 'BREAK' && next.subjectId === subjectId) return true;
    }
    return false;
  }

  _assign(classId, day, period, subjectId, teacherId) {
    this.grid[classId][day][period] = { subjectId, teacherId };
    const tk = `${teacherId}_${day}_${period}`;
    const dk = `${teacherId}_${day}`;
    this.teacherSlot[tk] = classId;
    this.teacherDayCount[dk] = (this.teacherDayCount[dk] || 0) + 1;
    this.teacherWeekCount[teacherId] = (this.teacherWeekCount[teacherId] || 0) + 1;
  }

  _getSlots(classId, teacherId) {
    const slots = [];
    for (let d = 0; d < this.days; d++) {
      for (let p = 0; p < this.periods; p++) {
        if (!this.breaks.has(p)) slots.push([d, p]);
      }
    }
    // Shuffle for randomness
    for (let i = slots.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [slots[i], slots[j]] = [slots[j], slots[i]];
    }
    // Sort: prefer days where this class has fewer periods & teacher has fewer periods
    slots.sort(([da, pa], [db2, pb]) => {
      const loadA = this.grid[classId][da].filter(x => x && x !== 'BREAK').length
                  + (this.teacherDayCount[`${teacherId}_${da}`] || 0);
      const loadB = this.grid[classId][db2].filter(x => x && x !== 'BREAK').length
                  + (this.teacherDayCount[`${teacherId}_${db2}`] || 0);
      return loadA - loadB;
    });
    return slots;
  }

  solve() {
    const classIds = this.db.classes.map(c => c.id);
    this._initGrid(classIds);

    const conflicts = [];
    const warnings = [];

    // Build variables: (classId, subjectId, required)
    const variables = [];
    for (const csm of this.db.class_subject_map) {
      for (const sid of csm.subject_ids) {
        const subj = this.db.subjects.find(s => s.id === sid);
        if (subj) variables.push({ classId: csm.class_id, subjectId: sid, needed: subj.ppw });
      }
    }

    // MRV: most constrained (highest required) first
    variables.sort((a, b) => b.needed - a.needed);

    for (const { classId, subjectId, needed } of variables) {
      const teacher = this._findTeacher(classId, subjectId);
      if (!teacher) {
        conflicts.push({ type: 'no_teacher', message: `No teacher for class ${classId}, subject ${subjectId}`, class_id: classId, subject_id: subjectId });
        continue;
      }

      let assigned = 0;
      const slots = this._getSlots(classId, teacher.id);

      // Pass 1: no consecutive
      for (const [d, p] of slots) {
        if (assigned >= needed) break;
        if (!this._canAssign(classId, d, p, teacher.id, subjectId)) continue;
        if (needed > 1 && this._hasConsecutive(classId, d, p, subjectId)) continue;
        this._assign(classId, d, p, subjectId, teacher.id);
        assigned++;
      }

      // Pass 2: allow consecutive if still short
      if (assigned < needed) {
        for (const [d, p] of slots) {
          if (assigned >= needed) break;
          if (!this._canAssign(classId, d, p, teacher.id, subjectId)) continue;
          if (this.grid[classId][d][p] !== null) continue;
          this._assign(classId, d, p, subjectId, teacher.id);
          assigned++;
        }
      }

      if (assigned < needed) {
        const subj = this.db.subjects.find(s => s.id === subjectId);
        const cls  = this.db.classes.find(c => c.id === classId);
        warnings.push(`${cls ? cls.name : classId} → ${subj ? subj.name : subjectId}: ${assigned}/${needed} periods assigned`);
        if (assigned === 0) {
          conflicts.push({ type: 'unscheduled', message: `Cannot schedule ${subj ? subj.name : subjectId} for ${cls ? cls.name : classId}`, class_id: classId, subject_id: subjectId });
        }
      }
    }

    // Stats
    let total = 0, filled = 0;
    for (const cid of classIds) {
      for (let d = 0; d < this.days; d++) {
        for (let p = 0; p < this.periods; p++) {
          if (!this.breaks.has(p)) {
            total++;
            if (this.grid[cid][d][p] && this.grid[cid][d][p] !== 'BREAK') filled++;
          }
        }
      }
    }

    return { grid: this.grid, conflicts, warnings, filled, total };
  }
}

/* ═══════════════════════════════════════
   APP STATE
   ═══════════════════════════════════════ */
const APP = {
  page:      'dashboard',
  timetable: null,
  conflicts: [],
  warnings:  [],
  ttFilled:  0,
  ttTotal:   0,
  generating: false,
  genStep:   0,
  ttView:    'class',
  ttClassId: DB.classes[0]?.id || 1,
  ttTeachId: DB.teachers[0]?.id || 1,
  modal:     null,
  toast:     null,
  drag:      null,
  _temp:     {},  // temp form state
};

/* ═══════════════════════════════════════
   UTILITIES
   ═══════════════════════════════════════ */
function uid() { return ++DB.nextId; }
function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function toast(msg, type = 'success') {
  APP.toast = { msg, type };
  render();
  if (APP._toastTimer) clearTimeout(APP._toastTimer);
  APP._toastTimer = setTimeout(() => { APP.toast = null; render(); }, 3500);
}

function go(page) { APP.page = page; render(); }

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}
function isLight(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (r*299 + g*587 + b*114) / 1000 > 140;
}

/* ═══════════════════════════════════════
   ACTIONS
   ═══════════════════════════════════════ */

function generate() {
  if (APP.generating) return;
  APP.generating = true;
  APP.genStep = 0;
  render();

  const steps = [
    'Loading configuration…',
    'Mapping class–subject relationships…',
    'Analysing teacher availability…',
    'Running CSP constraint solver…',
    'Applying backtracking optimisation…',
    'Validating zero-conflict output…',
    'Persisting timetable to store…',
  ];

  let step = 0;
  const advance = () => {
    step++;
    APP.genStep = step;
    render();
    if (step < steps.length - 1) {
      setTimeout(advance, 260 + Math.random() * 180);
    } else {
      // Run solver
      setTimeout(() => {
        try {
          const solver = new TimetableSolver(DB);
          const result = solver.solve();
          APP.timetable = result.grid;
          APP.conflicts = result.conflicts;
          APP.warnings  = result.warnings;
          APP.ttFilled  = result.filled;
          APP.ttTotal   = result.total;
          APP.generating = false;
          APP.page = 'timetable';
          render();
          if (result.conflicts.length === 0 && result.warnings.length === 0) {
            toast('✓ Timetable generated — zero conflicts!', 'success');
          } else if (result.warnings.length > 0) {
            toast(`Timetable generated with ${result.warnings.length} warning(s)`, 'info');
          } else {
            toast(`Generated with ${result.conflicts.length} conflict(s)`, 'error');
          }
        } catch (e) {
          APP.generating = false;
          toast('Solver error: ' + e.message, 'error');
          render();
        }
      }, 300);
    }
  };
  setTimeout(advance, 200);
}

// Dept
function addDept() {
  const name  = document.getElementById('d-name')?.value?.trim();
  const type  = document.getElementById('d-type')?.value;
  const color = APP._temp.deptColor || '#4f8ef7';
  if (!name) { toast('Enter department name', 'error'); return; }
  if (DB.departments.find(d => d.name === name)) { toast('Name already exists', 'error'); return; }
  DB.departments.push({ id: uid(), name, type, color });
  toast('Department added');
  render();
}
function delDept(id) {
  DB.departments = DB.departments.filter(d => d.id !== id);
  DB.classes = DB.classes.filter(c => c.dept_id !== id);
  DB.subjects = DB.subjects.filter(s => s.dept_id !== id);
  DB.teachers = DB.teachers.filter(t => t.dept_id !== id);
  toast('Department deleted');
  render();
}

// Class
function addClass() {
  const name = document.getElementById('c-name')?.value?.trim();
  const did  = parseInt(document.getElementById('c-dept')?.value);
  const str  = parseInt(document.getElementById('c-str')?.value) || 40;
  if (!name) { toast('Enter class name', 'error'); return; }
  const newCls = { id: uid(), name, dept_id: did, strength: str };
  DB.classes.push(newCls);
  DB.class_subject_map.push({ class_id: newCls.id, subject_ids: [] });
  toast('Class added');
  render();
}
function delClass(id) {
  DB.classes = DB.classes.filter(c => c.id !== id);
  DB.class_subject_map = DB.class_subject_map.filter(m => m.class_id !== id);
  toast('Class deleted');
  render();
}
function openSubjectMap(classId) {
  APP.modal = { type: 'subjectMap', classId };
  render();
}
function toggleSubjectMap(classId, subjectId, checked) {
  let csm = DB.class_subject_map.find(m => m.class_id === classId);
  if (!csm) { csm = { class_id: classId, subject_ids: [] }; DB.class_subject_map.push(csm); }
  if (checked) { if (!csm.subject_ids.includes(subjectId)) csm.subject_ids.push(subjectId); }
  else { csm.subject_ids = csm.subject_ids.filter(id => id !== subjectId); }
}

// Subject
function addSubject() {
  const name  = document.getElementById('s-name')?.value?.trim();
  const code  = document.getElementById('s-code')?.value?.trim()?.toUpperCase();
  const did   = parseInt(document.getElementById('s-dept')?.value);
  const ppw   = parseInt(document.getElementById('s-ppw')?.value) || 3;
  const color = APP._temp.subjColor || '#3b82f6';
  if (!name || !code) { toast('Enter name and code', 'error'); return; }
  DB.subjects.push({ id: uid(), name, code, dept_id: did, ppw, color });
  toast('Subject added');
  render();
}
function delSubject(id) {
  DB.subjects = DB.subjects.filter(s => s.id !== id);
  DB.class_subject_map.forEach(m => { m.subject_ids = m.subject_ids.filter(sid => sid !== id); });
  DB.teachers.forEach(t => { t.subject_ids = t.subject_ids.filter(sid => sid !== id); });
  toast('Subject deleted');
  render();
}

// Teacher
function addTeacher() {
  const name     = document.getElementById('t-name')?.value?.trim();
  const did      = parseInt(document.getElementById('t-dept')?.value);
  const maxDay   = parseInt(document.getElementById('t-maxday')?.value) || 4;
  const maxWeek  = parseInt(document.getElementById('t-maxweek')?.value) || 18;
  const sids     = [...document.querySelectorAll('#t-subj-list input:checked')].map(i => parseInt(i.value));
  const cids     = [...document.querySelectorAll('#t-cls-list input:checked')].map(i => parseInt(i.value));
  if (!name) { toast('Enter teacher name', 'error'); return; }
  if (!sids.length) { toast('Select at least one subject', 'error'); return; }
  if (!cids.length) { toast('Select at least one class', 'error'); return; }
  DB.teachers.push({ id: uid(), name, dept_id: did, subject_ids: sids, class_ids: cids, max_day: maxDay, max_week: maxWeek, unavailable: [] });
  toast('Teacher added');
  render();
}
function delTeacher(id) {
  DB.teachers = DB.teachers.filter(t => t.id !== id);
  toast('Teacher deleted');
  render();
}

// Manual override
function openEditCell(classId, day, period) {
  if (!APP.timetable) return;
  const cell = APP.timetable[classId]?.[day]?.[period];
  if (cell === 'BREAK') return;
  APP.modal = { type: 'editCell', classId, day, period, cell };
  render();
}
function applyOverride() {
  const { classId, day, period } = APP.modal;
  const subjId  = parseInt(document.getElementById('ov-subj')?.value) || null;
  const teachId = parseInt(document.getElementById('ov-teach')?.value) || null;
  if (subjId && teachId) {
    APP.timetable[classId][day][period] = { subjectId: subjId, teacherId: teachId };
  } else {
    APP.timetable[classId][day][period] = null;
  }
  APP.modal = null;
  toast('Slot updated');
  render();
}
function clearCell() {
  const { classId, day, period } = APP.modal;
  APP.timetable[classId][day][period] = null;
  APP.modal = null;
  toast('Slot cleared');
  render();
}

// Drag
function dragStart(e, classId, day, period) {
  APP.drag = { classId, day, period };
  e.dataTransfer.effectAllowed = 'move';
}
function dragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drop-target'); }
function dragLeave(e) { e.currentTarget.classList.remove('drop-target'); }
function dragDrop(e, classId, day, period) {
  e.preventDefault();
  e.currentTarget.classList.remove('drop-target');
  if (!APP.drag || !APP.timetable) return;
  const { classId: sc, day: sd, period: sp } = APP.drag;
  if (sc === classId && sd === day && sp === period) { APP.drag = null; return; }
  const a = APP.timetable[classId][day][period];
  const b = APP.timetable[sc][sd][sp];
  if (a === 'BREAK' || b === 'BREAK') { toast('Cannot swap break slots', 'error'); APP.drag = null; return; }
  APP.timetable[classId][day][period] = b;
  APP.timetable[sc][sd][sp] = a;
  APP.drag = null;
  toast('Slots swapped');
  render();
}

// Export
function exportCSV() {
  if (!APP.timetable) { toast('Generate first', 'error'); return; }
  const days = DB.config.day_names.slice(0, DB.config.working_days);
  let csv = 'Class,Period,' + days.join(',') + '\n';
  for (const cls of DB.classes) {
    const grid = APP.timetable[cls.id];
    if (!grid) continue;
    for (let p = 0; p < DB.config.periods_per_day; p++) {
      const row = [cls.name, `P${p+1}`];
      for (let d = 0; d < DB.config.working_days; d++) {
        const cell = grid[d]?.[p];
        if (cell === 'BREAK') row.push('BREAK');
        else if (!cell) row.push('Free');
        else {
          const s = DB.subjects.find(x => x.id === cell.subjectId);
          const t = DB.teachers.find(x => x.id === cell.teacherId);
          row.push(`${s?.code||'?'}(${t?.name?.split(' ').slice(-1)[0]||'?'})`);
        }
      }
      csv += row.join(',') + '\n';
    }
  }
  dl(csv, 'timetable.csv', 'text/csv');
  toast('CSV exported');
}
function exportJSON() {
  if (!APP.timetable) { toast('Generate first', 'error'); return; }
  const out = { config: DB.config, classes: DB.classes, subjects: DB.subjects, teachers: DB.teachers, timetable: APP.timetable };
  dl(JSON.stringify(out, null, 2), 'timetable.json', 'application/json');
  toast('JSON exported');
}
function dl(content, filename, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type }));
  a.download = filename;
  a.click();
}

    <div class="form-grid fg-4">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input id="t-name" class="form-input" placeholder="e.g. Dr. Sharma">
      </div>
      <div class="form-group">
        <label class="form-label">Department</label>
        <select id="t-dept" class="form-select">
          ${DB.departments.map(d=>`<option value="${d.id}">${esc(d.name)}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Max Periods/Day</label>
        <input id="t-maxday" type="number" class="form-input" value="4" min="1" max="10">
      </div>
      <div class="form-group">
        <label class="form-label">Max Periods/Week</label>
        <input id="t-maxweek" type="number" class="form-input" value="18" min="1" max="40">

    </div>
    <div class="form-grid fg-2" style="margin-top:12px">
      <div class="form-group">
        <label class="form-label">Can Teach Subjects</label>
        <div class="multi-list" id="t-subj-list">
          ${DB.subjects.map(s=>`
            <label class="multi-option">
              <input type="checkbox" value="${s.id}">
              <div class="dot" style="background:${s.color}"></div>
              ${esc(s.name)} <span style="color:var(--fog);font-size:10px">(${s.code})</span>
            </label>
          `).join('')}
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Assigned Classes</label>
        <div class="multi-list" id="t-cls-list">
          ${DB.classes.map(c=>`
            <label class="multi-option">
              <input type="checkbox" value="${c.id}">
              ${esc(c.name)}
            </label>
          `).join('')}
        </div>
      </div>

  <div class="card">
    <div class="card-header"><div class="card-title">All Teachers (${DB.teachers.length})</div></div>

            const subjBadges = t.subject_ids.map(sid=>{

                <div class="prog-track" style="width:80px">

}

function pgTimetable() {
  if (!APP.timetable) return `
    <div class="page-header"><div class="page-title">Timetable</div></div>
    <div class="card"><div class="empty-state">
      <div class="empty-icon">📅</div>
      <div class="empty-title">No timetable generated</div>
      <div class="empty-sub">Configure your data, then generate</div>
      <button class="btn btn-primary" style="margin-top:14px" onclick="generate()">⚡ Generate Timetable</button>
    </div></div>`;

  const { working_days, periods_per_day, break_periods, day_names } = DB.config;
  const days = day_names.slice(0, working_days);
  const breakSet = new Set(break_periods);

  // Build grid based on view
  let gridHtml = '';
  if (APP.ttView === 'class') {
    const cls = DB.classes.find(c => c.id === APP.ttClassId);
    if (!cls) return '<div>Select a class</div>';
    const grid = APP.timetable[cls.id];
    if (!grid) return '<div>No data for this class</div>';

    const csm = DB.class_subject_map.find(m => m.class_id === cls.id);
    const subjIds = csm?.subject_ids || [];

    gridHtml = `
    <div class="tt-wrap">
      <table class="tt-grid">
        <thead>
          <tr>
            <th style="width:70px">Period</th>
            ${days.map(d=>`<th>${d}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${Array.from({length:periods_per_day},(_,p)=>{
            const isBreak = breakSet.has(p);
            return `<tr>
              <td class="row-label">${isBreak?`🔔<br>Break`:`P${p+1}`}</td>
              ${days.map((_,d)=>{
                if (isBreak) return `<td><div class="tt-cell tt-cell-break"><span class="cell-break-label">BREAK</span></div></td>`;
                const cell = grid[d]?.[p];
                if (!cell || cell === 'BREAK') return `
                  <td ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dragDrop(event,${cls.id},${d},${p})">
                    <div class="tt-cell tt-cell-empty" onclick="openEditCell(${cls.id},${d},${p})">
                      <span class="cell-empty-label">+ Assign</span>
                    </div>
                  </td>`;
                const subj    = DB.subjects.find(s=>s.id===cell.subjectId);
                const teacher = DB.teachers.find(t=>t.id===cell.teacherId);
                const col     = subj?.color || '#4f8ef7';
                const textCol = isLight(col) ? '#111' : '#fff';
                return `<td draggable="true"
                  ondragstart="dragStart(event,${cls.id},${d},${p})"
                  ondragover="dragOver(event)" ondragleave="dragLeave(event)"
                  ondrop="dragDrop(event,${cls.id},${d},${p})">
                  <div class="tt-cell tt-cell-filled"
                    style="--cell-bg:${col}22;--cell-border:${col}55;--cell-text:${col};background:${col}22;border:1px solid ${col}55"
                    onclick="openEditCell(${cls.id},${d},${p})">
                    <span class="cell-subj" style="color:${col}">${subj?esc(subj.code):'?'}</span>
                    <span class="cell-name" style="color:${col}">${subj?esc(subj.name):'?'}</span>
                    <span class="cell-teacher">${teacher?esc(teacher.name.split(' ').slice(-1)[0]):'?'}</span>
                  </div>
                </td>`;
              }).join('')}
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    <div class="legend">
      ${subjIds.map(sid=>{
        const s=DB.subjects.find(x=>x.id===sid);
        return s?`<div class="legend-item"><div class="dot" style="background:${s.color}"></div>${esc(s.code)} — ${esc(s.name)}</div>`:'';
      }).join('')}
    </div>`;
  } else {
    // Teacher view
    const teacher = DB.teachers.find(t=>t.id===APP.ttTeachId);
    if (!teacher) return '<div>Select a teacher</div>';

    gridHtml = `
    <div class="tt-wrap">
      <table class="tt-grid">
        <thead>
          <tr>
            <th style="width:70px">Period</th>
            ${days.map(d=>`<th>${d}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${Array.from({length:periods_per_day},(_,p)=>{
            const isBreak = breakSet.has(p);
            return `<tr>
              <td class="row-label">${isBreak?`🔔<br>Break`:`P${p+1}`}</td>
              ${days.map((_,d)=>{
                if (isBreak) return `<td><div class="tt-cell tt-cell-break"><span class="cell-break-label">BREAK</span></div></td>`;
                // Search all classes for this teacher at this slot
                let found = null;
                for (const cls of DB.classes) {
                  const grid2 = APP.timetable[cls.id];
                  if (!grid2) continue;
                  const cell = grid2[d]?.[p];
                  if (cell && cell !== 'BREAK' && cell.teacherId === teacher.id) {
                    found = { cell, cls };
                    break;
                  }
                }
                if (!found) return `<td><div class="tt-cell tt-cell-empty"><span class="cell-empty-label">Free</span></div></td>`;
                const subj = DB.subjects.find(s=>s.id===found.cell.subjectId);
                const col  = subj?.color || '#4f8ef7';
                return `<td><div class="tt-cell tt-cell-filled"
                  style="background:${col}22;border:1px solid ${col}55">
                  <span class="cell-subj" style="color:${col}">${subj?esc(subj.code):'?'}</span>
                  <span class="cell-name" style="color:${col}">${esc(found.cls.name)}</span>
                  <span class="cell-teacher" style="color:${col}">${subj?esc(subj.name):'?'}</span>
                </div></td>`;
              }).join('')}
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
  }

  return `
  <div class="page-header">
    <div class="page-title">Timetable Grid</div>
    <div class="page-sub">Click any cell to edit · Drag to swap slots</div>
  </div>
  <div style="display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center">
    <button class="btn btn-teal" onclick="generate()">⚡ Regenerate</button>
    <button class="btn btn-ghost" onclick="exportCSV()">⬇ CSV</button>
    <button class="btn btn-ghost" onclick="exportJSON()">⬇ JSON</button>
    <div style="flex:1"></div>
    ${APP.warnings.length > 0 ? `<span class="badge badge-amber">⚠ ${APP.warnings.length} warning(s)</span>` : ''}
    <span class="badge badge-teal">✓ ${APP.ttFilled} slots assigned</span>
  </div>

  <div class="tabs">
    <button class="tab-btn${APP.ttView==='class'?' active':''}" onclick="APP.ttView='class';render()">By Class</button>
    <button class="tab-btn${APP.ttView==='teacher'?' active':''}" onclick="APP.ttView='teacher';render()">By Teacher</button>
  </div>

  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
    ${APP.ttView==='class' ? `
      <select class="form-select" style="max-width:260px" onchange="APP.ttClassId=parseInt(this.value);render()">
        ${DB.classes.map(c=>`<option value="${c.id}" ${APP.ttClassId===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}
      </select>
    ` : `
      <select class="form-select" style="max-width:260px" onchange="APP.ttTeachId=parseInt(this.value);render()">
        ${DB.teachers.map(t=>`<option value="${t.id}" ${APP.ttTeachId===t.id?'selected':''}>${esc(t.name)}</option>`).join('')}
      </select>
    `}
  </div>

  <div class="card">
    ${gridHtml}
  </div>`;
}

function pgValidation() {
  if (!APP.timetable) return `
    <div class="page-header"><div class="page-title">Validation</div></div>
    <div class="card"><div class="empty-state">
      <div class="empty-icon">✓</div>
      <div class="empty-title">Generate a timetable first</div>
      <button class="btn btn-primary" style="margin-top:14px" onclick="generate()">⚡ Generate</button>
    </div></div>`;

  // Build coverage report
  const coverageRows = [];
  for (const csm of DB.class_subject_map) {
    const cls = DB.classes.find(c=>c.id===csm.class_id);
    for (const sid of csm.subject_ids) {
      const subj = DB.subjects.find(s=>s.id===sid);
      if (!cls||!subj) continue;
      const grid = APP.timetable[cls.id];
      let assigned = 0;
      if (grid) for (const day of grid) for (const slot of day)
        if (slot && slot!=='BREAK' && slot.subjectId===sid) assigned++;
      const req = subj.ppw;
      const pct2 = Math.min(100, Math.round(assigned/req*100));
      const status = assigned>=req?'complete':assigned>0?'partial':'missing';
      coverageRows.push({ cls, subj, req, assigned, pct2, status });
    }
  }

  const isValid = APP.conflicts.length === 0;
  const pct = APP.ttTotal ? Math.round(APP.ttFilled/APP.ttTotal*100) : 0;

  return `
  <div class="page-header">
    <div class="page-title">Validation Report</div>
    <div class="page-sub">Constraint analysis and subject coverage</div>
  </div>

  <div class="${isValid?'alert alert-success':'alert alert-error'}">
    <span class="alert-icon">${isValid?'✓':'✗'}</span>
    <div>
      <strong>${isValid?'Timetable is valid — all hard constraints satisfied':'Constraint violations detected'}</strong><br>
      <span style="font-size:12px">${coverageRows.filter(r=>r.status==='complete').length}/${coverageRows.length} subjects fully covered · ${pct}% slot utilisation</span>
    </div>
  </div>

  ${APP.warnings.length > 0 ? `
  <div class="card">
    <div class="card-header"><div class="card-title">Warnings (${APP.warnings.length})</div></div>
    ${APP.warnings.map(w=>`
      <div style="display:flex;align-items:flex-start;gap:8px;padding:9px 0;border-bottom:1px solid var(--wire);font-size:12px">
        <span style="color:var(--amber);flex-shrink:0">⚠</span>
        <span style="color:var(--mist)">${esc(w)}</span>
      </div>
    `).join('')}
  </div>` : ''}

  <div class="card">
    <div class="card-header"><div class="card-title">Subject Coverage Analysis</div></div>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr><th>Class</th><th>Subject</th><th>Required</th><th>Assigned</th><th>Coverage</th><th>Status</th></tr></thead>
        <tbody>
          ${coverageRows.map(r=>`
            <tr>
              <td>${esc(r.cls.name)}</td>
              <td><div style="display:flex;align-items:center;gap:7px">
                <div class="dot" style="background:${r.subj.color}"></div>
                ${esc(r.subj.name)}
              </div></td>
              <td style="font-family:'DM Mono',monospace">${r.req}</td>
              <td style="font-family:'DM Mono',monospace;color:${r.assigned>=r.req?'var(--teal)':'var(--amber)'}">${r.assigned}</td>
              <td><div style="display:flex;align-items:center;gap:8px">
                <div class="coverage-bar"><div class="coverage-fill" style="width:${r.pct2}%;background:${r.status==='complete'?'var(--teal)':r.status==='partial'?'var(--amber)':'var(--rose)'}"></div></div>
                <span style="font-size:10px;color:var(--fog);font-family:'DM Mono',monospace">${r.pct2}%</span>
              </div></td>
              <td><span class="badge ${r.status==='complete'?'badge-teal':r.status==='partial'?'badge-amber':'badge-rose'}">
                ${r.status==='complete'?'✓ Complete':r.status==='partial'?'⚠ Partial':'✗ Missing'}
              </span></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <div class="card-header"><div class="card-title">Teacher Workload</div></div>
    ${DB.teachers.map(t=>{
      let actual = 0;
      if (APP.timetable) {
        for (const cid of t.class_ids) {
          const grid=APP.timetable[cid];
          if(!grid) continue;
          for (const day of grid) for (const slot of day)
            if (slot&&slot!=='BREAK'&&slot.teacherId===t.id) actual++;
        }
      }
      const dept = DB.departments.find(d=>d.id===t.dept_id);
      const util2 = Math.min(100,Math.round(actual/t.max_week*100));
      const initials = t.name.split(' ').map(x=>x[0]).join('').slice(0,2);
      return `<div class="workload-row">
        <div class="workload-avatar" style="background:${dept?.color||'var(--amber)'}">${initials}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600">${esc(t.name)}</div>
          <div style="font-size:10px;color:var(--fog);font-family:'DM Mono',monospace">${actual}/${t.max_week} periods · max ${t.max_day}/day</div>
          <div class="prog-track" style="margin-top:4px;width:200px">
            <div class="prog-fill" style="width:${util2}%;background:${util2>90?'var(--rose)':util2>70?'var(--amber)':'var(--teal)'}"></div>
          </div>
        </div>
        <span class="badge ${util2>90?'badge-rose':util2>70?'badge-amber':'badge-teal'}">${util2}%</span>
      </div>`;
    }).join('')}
  </div>`;
}

/* ─── MODALS ─── */

function renderModal() {
  if (!APP.modal) return '';
  const { type } = APP.modal;

  if (type === 'subjectMap') {
    const { classId } = APP.modal;
    const cls  = DB.classes.find(c=>c.id===classId);
    const dept = DB.departments.find(d=>d.id===cls?.dept_id);
    const csm  = DB.class_subject_map.find(m=>m.class_id===classId);
    const mapped = csm?.subject_ids || [];
    const deptSubjs = DB.subjects.filter(s=>s.dept_id===cls?.dept_id);
    return `<div class="modal-overlay" onclick="if(event.target===this){APP.modal=null;render()}">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">Subjects for ${esc(cls?.name||'')}</div>
          <button class="modal-close" onclick="APP.modal=null;render()">✕</button>
        </div>
        <p style="font-size:12px;color:var(--fog);margin-bottom:14px">Select subjects to assign to this class (dept: ${esc(dept?.name||'')})</p>
        <div style="display:flex;flex-direction:column;gap:7px">
          ${deptSubjs.length ? deptSubjs.map(s=>{
            const checked = mapped.includes(s.id);
            return `<label style="display:flex;align-items:center;gap:12px;padding:10px;background:var(--ink3);border:1px solid ${checked?s.color+'60':'var(--wire)'};border-radius:var(--r);cursor:pointer;transition:border .15s">
              <input type="checkbox" ${checked?'checked':''} style="accent-color:${s.color};width:15px;height:15px"
                onchange="toggleSubjectMap(${classId},${s.id},this.checked)">
              <div class="dot" style="background:${s.color}"></div>
              <span style="flex:1">${esc(s.name)}</span>
              <code style="background:${s.color}20;color:${s.color};padding:1px 7px;border-radius:4px;font-size:10px">${s.code}</code>
              <span style="font-size:11px;color:var(--fog);font-family:'DM Mono',monospace">${s.ppw}/wk</span>
            </label>`;
          }).join('') : `<div class="empty-state" style="padding:24px"><div class="empty-title">No subjects in this department</div><div class="empty-sub">Add subjects to ${esc(dept?.name||'')} first</div></div>`}
        </div>
        <button class="btn btn-primary" style="margin-top:18px;width:100%" onclick="APP.modal=null;render()">Done</button>
      </div>
    </div>`;
  }

  if (type === 'editCell') {
    const { classId, day, period, cell } = APP.modal;
    const cls   = DB.classes.find(c=>c.id===classId);
    const dayName = DB.config.day_names[day];
    const csm   = DB.class_subject_map.find(m=>m.class_id===classId);
    const validSubjs = (csm?.subject_ids||[]).map(sid=>DB.subjects.find(s=>s.id===sid)).filter(Boolean);
    const validTeachers = DB.teachers.filter(t=>t.class_ids.includes(classId));
    const currentSubjId = cell && cell!=='BREAK' ? cell.subjectId : null;
    const currentTeachId = cell && cell!=='BREAK' ? cell.teacherId : null;
    return `<div class="modal-overlay" onclick="if(event.target===this){APP.modal=null;render()}">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">Edit Slot</div>
          <button class="modal-close" onclick="APP.modal=null;render()">✕</button>
        </div>
        <div style="font-size:12px;color:var(--fog);margin-bottom:18px;font-family:'DM Mono',monospace">
          ${esc(cls?.name||'')} · ${dayName} · Period ${period+1}
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Subject</label>
            <select id="ov-subj" class="form-select">
              <option value="">— Free Slot —</option>
              ${validSubjs.map(s=>`<option value="${s.id}" ${currentSubjId===s.id?'selected':''}>${esc(s.name)} (${s.code})</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Teacher</label>
            <select id="ov-teach" class="form-select">
              <option value="">— No Teacher —</option>
              ${validTeachers.map(t=>`<option value="${t.id}" ${currentTeachId===t.id?'selected':''}>${esc(t.name)}</option>`).join('')}
            </select>
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-top:18px">
          <button class="btn btn-primary" style="flex:1" onclick="applyOverride()">Apply Change</button>
          ${cell && cell!=='BREAK'?`<button class="btn btn-danger" onclick="clearCell()">Clear</button>`:''}
          <button class="btn btn-ghost" onclick="APP.modal=null;render()">Cancel</button>
        </div>
      </div>
    </div>`;
  }
  return '';
}

/* ─── MAIN RENDER ─── */

function render() {
  const pageMap = {
    dashboard:   pgDashboard,
    config:      pgConfig,
    departments: pgDepartments,
    classes:     pgClasses,
    subjects:    pgSubjects,
    teachers:    pgTeachers,
    timetable:   pgTimetable,
    validation:  pgValidation,
  };
  const pgFn = pageMap[APP.page] || pgDashboard;

  document.getElementById('app').innerHTML = `
    ${renderSidebar()}
    <div class="main">
      ${renderTopbar()}
      <div class="content">
        ${pgFn()}
      </div>
    </div>
    ${renderModal()}
    ${APP.toast ? `<div class="toast toast-${APP.toast.type}">${APP.toast.type==='success'?'✓':APP.toast.type==='error'?'✗':'ℹ'} ${esc(APP.toast.msg)}</div>` : ''}
  `;

  // Init temp state defaults
  if (!APP._temp.deptColor) APP._temp.deptColor = SWATCHES[0];
  if (!APP._temp.subjColor) APP._temp.subjColor = SWATCHES[0];
}

// Boot
render();
</script>
</body>
</html>
